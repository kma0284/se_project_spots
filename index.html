<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="author" content="Katelynn Anderson"/><meta name="description" content="an app to share images and thoughts"/><meta name="keywords" content="images like tags chat"/><title>Spots</title><base href="/se_project_spots/"><link rel="icon" href="/se_project_spots/favicon.ico"><script defer="defer" src="/se_project_spots/main.js"></script></head><body><div class="page"><header class="header"><img class="header__logo" alt="spots logo"/></header><main class="content"><section class="profile page__section"><img class="profile__avatar" alt="picture of Bessie Coleman"/><div class="profile__column"><h1 class="profile__name">Bessie Coleman</h1><p class="profile__description">Civil Aviator</p><button type="button" class="profile__edit-btn"><img alt="pencil icon"/>Edit Profile</button></div><button type="button" class="profile__add-btn" id="profile-add-btn"><img alt="plus icon"/>New Post</button></section><section class="cards page__section"><ul class="cards__list"><template id="card-template"><li class="card"><button class="card__delete-btn"></button> <img class="card__image" alt=""/><div class="card__content"><h2 class="card__title"></h2><button type="button" class="card__like-button"></button></div></li></template></ul></section><footer class="footer"><p class="footer__copyright">2025 &copy; Spots</p></footer></main><div class="modal" id="edit-profile-modal"><div class="modal__container"><button type="button" class="modal__close-btn"><img alt="close button"/></button><h2 class="modal__title">Edit profile</h2><form class="modal__form" id="profile-form" novalidate><label for="profile-name-input" class="modal__label">Name <input id="profile-name-input" class="modal__input" placeholder="Type your name" required minlength="2" maxlength="40"/> <span id="profile-name-input-error" class="modal__error"></span></label> <label for="profile-description-input" class="modal__label">Description <input id="profile-description-input" class="modal__input" placeholder="Describe yourself" required minlength="2" maxlength="200"/> <span id="profile-description-input-error" class="modal__error"></span></label> <button id="profile_save-btn" type="submit" class="modal__save-btn">Save</button></form></div></div><div class="modal" id="new-post-modal"><div class="modal__container"><button type="button" class="modal__close-btn"><img alt="close button"/></button><h2 class="modal__title">New post</h2><form class="modal__form" id="add_card_form"><label for="profile-image-input" class="modal__label">Image link <input id="profile-image-input" type="url" class="modal__input" placeholder="Paste a link to the picture" required/> <span id="profile-image-input-error" class="modal__error"></span></label> <label for="profile-caption-input" class="modal__label">Caption <input id="profile-caption-input" class="modal__input" placeholder="Type your caption" required minlength="2" maxlength="30"/> <span id="profile-caption-input-error" class="modal__error"></span></label> <button type="submit" class="modal__save-btn">Save</button></form></div></div><div class="modal" id="preview-modal"><div class="modal__image-container"><button aria-label="Close modal" type="button" class="modal__close-btn modal__close-btn_type_preview"><img class="modal__close-image" alt="close button"/></button> <img class="modal__image" alt=""/><p class="modal__caption"></p></div></div></div></body></html>
