<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Katelynn Anderson" />
    <meta name="description" content="An app to share images and thoughts" />
    <title>Spots</title>
  </head>

  <body>
    <div class="page">
      <!-- HEADER -->
      <header class="header">
        <img class="header__logo" alt="Spots logo" />
      </header>

      <!-- MAIN -->
      <main class="content">
        <!-- PROFILE -->
        <section class="profile page__section">
          <div class="profile__avatar-container">
            <img class="profile__avatar" alt="User avatar" />

            <button
              type="button"
              class="profile__avatar-edit-btn"
              aria-label="Edit avatar"
            >
              <img alt="Edit avatar icon" />
              <p>Edit Avatar</p>
            </button>
          </div>

          <div class="profile__column">
            <h1 class="profile__name">Besie Coleman</h1>
            <p class="profile__description">Civil Aviator</p>

            <button
              type="button"
              class="profile__edit-btn"
              aria-label="Edit profile"
            >
              <img alt="Edit profile icon" />
              Edit Profile
            </button>
          </div>
          <button
            type="button"
            class="profile__add-btn"
            id="profile-add-btn"
            aria-label="New post"
          >
            <img alt="New post icon" />
            New Post
          </button>
        </section>

        <!-- CARDS -->
        <section class="cards page__section">
          <ul class="cards__list"></ul>

          <!-- TEMPLATE -->
          <template id="card-template">
            <li class="card">
              <button
                class="card__delete-btn"
                aria-label="Delete card"
              ></button>

              <img class="card__image" alt="Card image" />

              <div class="card__content">
                <h2 class="card__title"></h2>
                <button
                  type="button"
                  class="card__like-btn"
                  aria-label="Like card"
                ></button>
              </div>
            </li>
          </template>
        </section>

        <!-- EDIT PROFILE MODAL -->
        <div class="modal" id="edit-profile-modal">
          <div class="modal__container">
            <button type="button" class="modal__close-btn">
              <img alt="Close modal" />
            </button>

            <h2 class="modal__title">Edit profile</h2>

            <form class="modal__form" id="profile-form" novalidate>
              <label class="modal__label">
                Name
                <input
                  id="profile-name-input"
                  name="name"
                  type="text"
                  class="modal__input"
                  placeholder="Type your name"
                  required
                  minlength="2"
                  maxlength="40"
                />
                <span class="modal__error" id="profile-name-input-error"></span>
              </label>

              <label class="modal__label">
                Description
                <input
                  id="profile-description-input"
                  name="description"
                  type="text"
                  class="modal__input"
                  placeholder="Describe yourself"
                  required
                  minlength="2"
                  maxlength="200"
                />
                <span
                  class="modal__error"
                  id="profile-description-input-error"
                ></span>
              </label>

              <button type="submit" class="modal__save-btn">Save</button>
            </form>
          </div>
        </div>

        <!-- NEW POST MODAL -->
        <div class="modal" id="new-post-modal">
          <div class="modal__container">
            <button type="button" class="modal__close-btn">
              <img alt="Close modal" />
            </button>

            <h2 class="modal__title">New post</h2>
            <form class="modal__form" id="add_card_form" novalidate>
              <label class="modal__label">
                Image link
                <input
                  id="profile-image-input"
                  name="link"
                  type="url"
                  class="modal__input"
                  placeholder="Paste a link to the picture"
                  required
                />
                <span
                  class="modal__error"
                  id="profile-image-input-error"
                ></span>
              </label>

              <label class="modal__label">
                Caption
                <input
                  id="profile-caption-input"
                  name="title"
                  type="text"
                  class="modal__input"
                  placeholder="Type your caption"
                  required
                  minlength="2"
                  maxlength="30"
                />
                <span
                  class="modal__error"
                  id="profile-caption-input-error"
                ></span>
              </label>

              <button type="submit" class="modal__save-btn">Save</button>
            </form>
          </div>
        </div>

        <!-- IMAGE PREVIEW MODAL -->
        <div class="modal" id="preview-modal">
          <div class="modal__image-container">
            <button
              type="button"
              class="modal__close-btn modal__close-btn_type_preview"
              aria-label="Close preview"
              alt="Close modal"
            ></button>

            <img class="modal__image" alt="Preview image" />
            <p class="modal__caption"></p>
          </div>
        </div>
        <!-- EDIT AVATAR IMAGE -->

        <div class="modal" id="edit-avatar-modal">
          <div class="modal__container">
            <button
              type="button"
              class="modal__close-btn modal__close-btn-type_preview"
            >
              <img alt="Close modal" />
            </button>

            <h2 class="modal__title">Edit profile avatar</h2>

            <form id="avatar-form" class="modal__form" novalidate>
              <label class="modal__label">
                Profile Picture
                <input
                  id="profile-avatar-input"
                  name="avatar"
                  type="url"
                  class="modal__input"
                  placeholder="Paste the link to an image"
                  required
                />
                <span
                  class="modal__error"
                  id="profile-avatar-input-error"
                ></span>
              </label>

              <button type="submit" class="modal__save-btn">Save</button>
            </form>
          </div>
        </div>
        <!-- DELETE CONFIRMATION MODAL -->
        <div class="modal" id="confirm-delete-modal">
          <div class="modal__container">
            <button
              type="button"
              class="modal__close-btn modal__close-btn-type_delete"
            >
              <img alt="Close modal" />
            </button>

            <h2 class="modal__title-type_delete">
              Are you sure you want to delete this image?
            </h2>
            <form class="modal__form modal__form_type_delete" id="delete-form">
              <button type="submit" class="modal__confirm-btn modal__save-btn">
                Delete
              </button>
              <button type="button" class="modal__cancel-btn">Cancel</button>
            </form>
          </div>
        </div>
        <!-- FOOTER -->
        <footer class="footer">
          <p class="footer__copyright">2026 © Spots</p>
        </footer>
      </main>
    </div>
  </body>
</html>
